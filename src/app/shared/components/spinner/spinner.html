<span
  class="inline-block animate-spin rounded-full border-2 border-neutral-200 border-t-neutral-900"
  [class.h-6]="size === 'sm'"
  [class.w-6]="size === 'sm'"
  [class.h-8]="size === 'md'"
  [class.w-8]="size === 'md'"
  role="status"
  aria-live="polite"
  [attr.aria-label]="ariaLabel"
></span>
