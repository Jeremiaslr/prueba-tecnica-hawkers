<div
  class="modal-overlay fixed inset-0 z-50 flex items-center justify-center bg-black/70 px-2 sm:px-4 py-4 sm:py-6 transition-opacity duration-200"
  (click)="onOverlayClick($event)"
>
  <div
    class="relative w-full max-w-5xl max-h-[92vh] overflow-y-auto bg-white shadow-2xl transition-all duration-300 ease-out animate-[modalIn_0.28s_ease-out]"
  >
    <button
      type="button"
      class="absolute right-4 top-4 z-10 flex h-10 w-10 cursor-pointer items-center justify-center rounded-full bg-black text-white outline-none ring-2 ring-white/90 transition-[transform,background-color,box-shadow] duration-200 hover:bg-neutral-900 hover:scale-105 active:scale-95 focus-visible:ring-2 focus-visible:ring-neutral-900 focus-visible:ring-offset-2 focus-visible:ring-offset-white sm:right-5 sm:top-5"
      (click)="close()"
      aria-label="Cerrar modal"
    >
      ✕
    </button>

    <div class="grid grid-cols-1 lg:grid-cols-[1.2fr_0.8fr]">
      <div class="flex items-center justify-center bg-[#f4f4f4] p-4 sm:p-6 lg:p-10">
        <button
          type="button"
          class="w-full cursor-zoom-in overflow-hidden rounded-sm outline-none transition-[box-shadow,background-color] duration-200 hover:bg-black/5 focus-visible:ring-2 focus-visible:ring-neutral-900 focus-visible:ring-offset-2 focus-visible:ring-offset-[#f4f4f4]"
          (click)="toggleZoom()"
          aria-label="Ampliar imagen del producto"
        >
        <img
          [src]="imageUrl"
          [alt]="product.title"
          (error)="onImageError($event)"
          (mousemove)="onImageMouseMove($event)"
          (mouseleave)="onImageMouseLeave()"
          [style.transform-origin]="zoomOrigin"
          class="mx-auto block max-h-[52vh] sm:max-h-[65vh] lg:max-h-[78vh] w-auto max-w-full object-contain transition-transform duration-300 ease-out"
          [class.scale-150]="zoomed"
          [class.cursor-zoom-out]="zoomed"
        />
        </button>
      </div>

      <div
        class="flex flex-col justify-center p-4 sm:p-6 lg:px-10 lg:pb-10 lg:pt-14 lg:pr-[4.75rem]"
      >
        <h2
          class="mb-4 break-words text-lg font-semibold uppercase tracking-[0.08em] text-neutral-900 sm:text-xl lg:max-w-full"
        >
          {{ product.title }}
        </h2>

        <p class="mb-6 inline-block w-fit bg-black px-3 py-2 text-sm font-semibold text-white">
          {{ formattedPrice }}
        </p>

        <p class="text-sm leading-6 text-neutral-700">
          {{ product.description }}
        </p>

        <p class="mt-6 text-xs uppercase tracking-[0.12em] text-neutral-500">
          Haz clic en la imagen para activar o desactivar el zoom
        </p>
      </div>
    </div>
  </div>
</div>
