<article class="group">
  <div class="flex items-center justify-center">
    <img
      [src]="imageUrl"
      [alt]="product.title"
      class="block h-auto w-full max-w-[200px] object-contain transition-transform duration-300 group-hover:scale-[1.02]"
      loading="lazy"
    />
  </div>

  <div class="flex items-end justify-between gap-3 border-b border-black pb-1">
    <div class="min-w-0">
      <p class="truncate text-[11px] uppercase tracking-[0.12em] text-neutral-800">
        {{ formattedTitle }}
      </p>
    </div>

    <div class="shrink-0 bg-black px-2 py-[3px] text-[12px] font-semibold text-white">
      {{ formattedPrice }}
    </div>
  </div>
</article>
