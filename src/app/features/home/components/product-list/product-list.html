<section class="mx-auto w-full max-w-[1050px] px-2 sm:px-4 pt-2 pb-10">
  @if (products$ | async; as products) {
    <div class="grid grid-cols-2 gap-y-8 gap-x-4 sm:grid-cols-2 sm:gap-x-8 sm:gap-y-10 lg:grid-cols-3">
      @for (product of products.slice(0, visibleCount); track product.id) {
        <app-product-card
          [product]="product"
          (productSelected)="openProductModal($event)"
        ></app-product-card>
      }
    </div>

    @if (hasMoreProducts(products.length)) {
      <div #scrollAnchor class="h-1 w-full" aria-hidden="true"></div>
    }
  }

  @if (selectedProduct) {
    <app-product-modal
      [product]="selectedProduct"
      (closeModal)="closeProductModal()"
    ></app-product-modal>
  }
</section>
